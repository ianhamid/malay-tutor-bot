services:
  web-interface:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    command: ["streamlit", "run", "app.py", "--server.port=8501", "--server.address=0.0.0.0"]

  telegram-bot:
    build: .
    env_file:
      - .env
    command: ["python", "bot.py"] # Assuming your telegram bot file is named bot.py